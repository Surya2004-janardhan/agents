version: "3.9"

# Database: Neon PostgreSQL (external, serverless)
# Message Broker: CloudAMQP (external)
# Redis: Redis Labs (external) or Local

services:
  # ─── Node Backend (Consolidated API + Worker) ────────────────
  node-backend:
    build: ./backend/node-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=development
      - PORT=4000
    ports:
      - "4000:4000"

  # ─── Python Backend (AI/ML Operations) ───────────────────────
  python-backend:
    build: ./backend/python-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"

  # ─── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - node-backend
